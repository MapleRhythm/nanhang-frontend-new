<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>物理层接入测试</title>
  <style>
    * { box-sizing: border-box; }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      background: #ffffff;
      color: #1f2937;
    }

    .page {
      height: 100%;
      display: grid;
      grid-template-columns: minmax(320px, 0.34fr) minmax(0, 0.66fr);
      grid-template-rows: minmax(0, 0.56fr) minmax(0, 0.44fr);
      grid-template-areas:
        "flow image"
        "controls logs";
      gap: 14px;
      padding: 12px 16px;
      min-height: 0;
      overflow: hidden;
    }

    .section {
      padding: 0;
      min-height: 0;
    }

    .page > .section {
      display: contents;
    }

    .section + .section {
      border-top: 0;
    }

    .hero-section {
      grid-area: image;
      min-height: 0;
    }

    .hero-scene {
      grid-area: image;
      width: 100%;
      height: 100%;
      padding: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      background: #ffffff;
    }

    .physical-hero-layout {
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 0.47fr) minmax(0, 0.53fr);
      gap: 12px;
    }

    .physical-left-stack {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 3.7fr) minmax(120px, 0.85fr);
      gap: 20px;
    }

    .diagram-panel {
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-header {
      background: linear-gradient(to right, #2b4c7e, #567ebb);
      color: #ffffff;
      padding: 8px 16px;
      font-weight: 700;
      font-size: 18px;
      border-radius: 10px 10px 0 0;
      margin: 4px;
      flex: 0 0 auto;
    }

    .panel-header-secondary {
      background: linear-gradient(180deg, #edf4fc 0%, #d9e7f8 100%);
      color: #28415e;
      border: 1px solid #c5d6ea;
      font-size: 16px;
      font-weight: 700;
    }

    .physical-canvas {
      position: relative;
      flex: 1;
      min-height: 0;
      background: #ffffff;
    }

    .physical-canvas--summary {
      padding: 20px 22px;
      display: grid;
      grid-template-rows: 1fr;
      gap: 0;
      background: #ffffff;
    }

    .physical-card-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .right-elements-boost image:not(.keep-transform),
    .right-elements-boost text,
    .right-elements-boost rect,
    .right-elements-boost line {
      transform-box: fill-box;
      transform-origin: center;
      transform: scale(1.2);
    }

    .svg-center-transform {
      transform-box: fill-box;
      transform-origin: center;
    }

    .physical-platform-chip {
      display: grid;
      place-items: center;
      min-height: 62px;
      border: 1px solid rgba(34, 211, 238, 0.72);
      border-radius: 14px;
      background:
        linear-gradient(135deg, rgba(34, 211, 238, 0.22), rgba(14, 165, 233, 0.08)),
        linear-gradient(180deg, rgba(8, 47, 73, 0.96), rgba(2, 6, 23, 0.9));
      color: #ecfeff;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 0.8px;
      box-shadow: inset 0 0 18px rgba(34, 211, 238, 0.18), 0 0 12px rgba(14, 165, 233, 0.18);
    }

    .physical-platform-chip--inline {
      min-height: 0;
      height: 50px;
      border-radius: 10px;
      font-size: 24px;
      border-color: rgba(125, 211, 252, 0.78);
    }

    .physical-summary-box {
      padding: 2px 6px 0;
    }

    .physical-summary-title {
      margin: 0 0 14px;
      color: #0b3a83;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: 0.3px;
    }

    .physical-summary-title::before {
      content: none;
    }

    .physical-summary-list {
      margin: 0;
      padding-left: 26px;
      color: #111827;
      font-size: 16px;
      line-height: 1.42;
      font-weight: 650;
    }

    .bottom-layout {
      display: contents;
    }

    .left-panel {
      display: contents;
    }

    .flow-panel,
    .controls-panel {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #f9fafb;
      padding: 12px;
      display: grid;
      gap: 10px;
      min-height: 0;
      overflow: hidden;
    }

    .flow-panel {
      grid-area: flow;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    .controls-panel {
      grid-area: controls;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    .controls-heading {
      margin: 0;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 12px;
      border: 1px solid rgba(34, 211, 238, 0.34);
      display: flex;
      align-items: center;
      color: #0f172a;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.04em;
      background: linear-gradient(90deg, rgba(34, 211, 238, 0.12), rgba(251, 191, 36, 0.1));
    }

    .parameter-grid {
      display: grid;
      gap: 10px;
      align-content: center;
      min-height: 0;
    }

    .parameter-card {
      padding: 12px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 14px;
      background: rgba(248, 250, 252, 0.92);
      display: grid;
      gap: 4px;
    }

    .parameter-label {
      color: #475569;
      font-size: 13px;
      font-weight: 800;
    }

    .parameter-value {
      color: #0f172a;
      font-size: 18px;
      font-weight: 900;
    }

    .mode-buttons {
      grid-area: controls;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      min-height: 0;
      align-content: start;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #f9fafb;
      padding: 12px;
      overflow: hidden;
    }

    .mode-buttons::before {
      content: "测试参数与开始按钮";
      order: 0;
      grid-column: 1 / -1;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 12px;
      border: 1px solid rgba(34, 211, 238, 0.34);
      display: flex;
      align-items: center;
      color: #0f172a;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.04em;
      background: linear-gradient(90deg, rgba(34, 211, 238, 0.12), rgba(251, 191, 36, 0.1));
    }
.mode-btn {
      order: 2;
      border: 1px solid #0f5f82;
      border-radius: 8px;
      background: #186487;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      padding: 12px 10px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .mode-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(24, 100, 135, 0.25);
    }

    .mode-btn.is-active {
      background: #0d4f6d;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.3);
    }

    .flow-wrap {
      grid-area: flow;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
      padding: 10px;
      min-height: 0;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 8px;
    }

    .flow-title {
      min-height: 34px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid rgba(34, 211, 238, 0.34);
      display: flex;
      align-items: center;
      color: #0f172a;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.08em;
      background: linear-gradient(90deg, rgba(34, 211, 238, 0.14), rgba(14, 165, 233, 0.08));
    }

    .flow-svg {
      width: 100%;
      height: 100%;
    }

    .flow-base {
      fill: none;
      stroke: #8ab8de;
      stroke-width: 20;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .flow-active {
      fill: none;
      stroke: #2563eb;
      stroke-width: 30;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 4px rgba(37, 99, 235, 0.6));
    }

    .flow-node {
      fill: #ffffff;
      stroke: #93a4b5;
      stroke-width: 3;
      transition: fill 0.3s ease, stroke 0.3s ease, r 0.3s ease;
    }

    .flow-node.is-visited {
      fill: #ffffff;
      stroke: #2563eb;
    }

    .flow-node.is-active {
      fill: #ffffff;
      stroke: #1d4ed8;
      stroke-width: 4;
    }

    .flow-label-small {
      fill: #111827;
      font-size: 18px;
      font-weight: 600;
      user-select: none;
    }

    .flow-status {
      order: 2;
      grid-column: 1 / -1;
      margin: 0;
      min-height: 34px;
      padding: 11px 16px;
      font-size: 19px;
      color: #cffafe;
      font-weight: 800;
      letter-spacing: 0.03em;
      border: 1px solid rgba(56, 189, 248, 0.22);
      border-radius: 999px;
      background: rgba(8, 47, 73, 0.28);
      display: flex;
      align-items: center;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: none;
    }

    .right-panel {
      grid-area: logs;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      min-height: 0;
    }

    .log-box {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #ffffff;
      color: #3b82f6;
      padding: 12px;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
      overflow: hidden;
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .log-title {
      margin: 0;
      font-size: 16px;
      color: #3b82f6;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 8px;
    }

    .log-content {
      margin: 10px 0 0;
      padding: 0;
      list-style: none;
      font-size: 12px;
      color: #3b82f6;
      line-height: 1.6;
      overflow-y: scroll;
      overflow-x: hidden;
      scrollbar-gutter: stable;
      white-space: pre-wrap;
    }

    .log-content li {
      margin: 0 0 7px;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid rgba(56, 189, 248, 0.12);
      background: rgba(15, 23, 42, 0.42);
      display: flex;
      gap: 6px;
      align-items: flex-start;
      word-break: break-word;
    }

    .log-content li::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fbbf24;
      margin-top: 7px;
      flex: 0 0 auto;
      box-shadow: 0 0 8px rgba(251, 191, 36, 0.8);
    }

    .log-line {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 5px;
      min-width: 0;
    }

    .log-time {
      color: #94a3b8;
    }

    .log-device {
      color: #fde68a;
      font-weight: 700;
      text-shadow: none;
    }

    .log-message {
      color: #bfdbfe;
    }

    @media (max-width: 1200px) {
      .page {
        height: auto;
        grid-template-columns: 1fr;
        grid-template-rows: minmax(320px, auto) minmax(360px, auto) minmax(220px, auto) minmax(320px, auto);
        grid-template-areas:
          "flow"
          "image"
          "controls"
          "logs";
        overflow: auto;
      }

      .hero-scene {
        min-height: 980px;
        overflow: auto;
      }

      .physical-hero-layout {
        grid-template-columns: 1fr;
      }

      .physical-left-stack {
        grid-template-rows: minmax(390px, 1.5fr) minmax(50px, auto);
      }

      .bottom-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .right-panel {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .section {
        padding: 10px;
      }

      .mode-buttons {
        grid-template-columns: 1fr;
      }

      .flow-label-small {
        font-size: 15px;
      }

      .physical-platform-chip {
        font-size: 22px;
      }

      .physical-summary-title {
        font-size: 22px;
      }

      .physical-summary-list {
        font-size: 16px;
      }
    }
    /* 全站科技风主题覆盖：深色背景、青蓝光效、终端化日志 */
    body {
      background:
        radial-gradient(circle at 12% 16%, rgba(34, 211, 238, 0.16), transparent 30%),
        radial-gradient(circle at 88% 12%, rgba(59, 130, 246, 0.16), transparent 32%),
        linear-gradient(rgba(34, 211, 238, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34, 211, 238, 0.05) 1px, transparent 1px),
        #020617;
      background-size: auto, auto, 34px 34px, 34px 34px, auto;
      color: #dbeafe;
    }

    .page,
    .section,
    .hero-section,
    .hero-scene {
      background: transparent !important;
    }

    .section + .section {
      border-top-color: rgba(125, 211, 252, 0.28);
    }

    .hero-scene,
    .diagram-panel,
    .flow-wrap,
    .mode-buttons,
    .log-box {
      background: rgba(2, 8, 23, 0.88) !important;
      border: 1px solid rgba(34, 211, 238, 0.36) !important;
      box-shadow: inset 0 0 24px rgba(34, 211, 238, 0.08), 0 0 22px rgba(14, 165, 233, 0.16) !important;
      backdrop-filter: blur(10px);
    }

    .panel-header,
    .panel-header-secondary {
      background: linear-gradient(135deg, #0f766e, #0ea5e9) !important;
      color: #ecfeff !important;
      border-color: rgba(45, 212, 191, 0.72) !important;
      box-shadow: 0 0 14px rgba(34, 211, 238, 0.24);
    }

    .physical-canvas,
    .physical-canvas--summary {
      background: transparent !important;
    }

    .physical-summary-title,
    .flow-heading,
    .flow-title,
    .log-title,
    .status,
    .log-metric {
      color: #67e8f9 !important;
      fill: #22d3ee !important;
      text-shadow: none;
    }

    .physical-summary-list,
    .flow-label-small {
      color: #dbeafe !important;
      fill: #dbeafe !important;
    }

    .physical-card-svg text {
      fill: #0f172a !important;
      text-shadow: none;
    }

    .physical-card-svg--right text {
      fill: #dbeafe !important;
    }

    .physical-card-svg--right .diagram-text-strong {
      fill: #e0f2fe !important;
    }

    .physical-card-svg--right .diagram-text-danger {
      fill: #fb7185 !important;
    }

    .physical-card-svg--right .diagram-text-warning {
      fill: #fbbf24 !important;
    }

    .physical-card-svg--right text[x="944"] {
      fill: #fb7185 !important;
    }

    .physical-card-svg--right text[x="1000"] {
      fill: #fbbf24 !important;
    }

    .physical-card-svg--right text[x="1198"],
    .physical-card-svg--right text[x="1028"],
    .physical-card-svg--right text[x="1307"],
    .physical-card-svg--right text[x="1430"],
    .physical-card-svg--right text[x="1549"] {
      fill: #e0f2fe !important;
    }

    .flow-base {
      stroke: rgba(125, 211, 252, 0.54) !important;
    }

    .flow-active {
      stroke: #22d3ee !important;
      filter: drop-shadow(0 0 6px rgba(34, 211, 238, 0.72));
    }

    .flow-node {
      fill: #020617 !important;
      stroke: #7dd3fc !important;
    }

    .log-content {
      color: #93c5fd !important;
    }

    .log-content li {
      background: rgba(15, 23, 42, 0.42) !important;
      border-color: rgba(56, 189, 248, 0.12) !important;
    }

    .log-title {
      border-bottom-color: rgba(125, 211, 252, 0.24) !important;
    }

    .mode-buttons::before {
      border-color: rgba(251, 191, 36, 0.4) !important;
      background:
        linear-gradient(90deg, rgba(251, 191, 36, 0.2), rgba(34, 211, 238, 0.12)),
        rgba(2, 6, 23, 0.62) !important;
      color: #fef3c7 !important;
      text-shadow: none;
    }
.flow-status {
      background: rgba(8, 47, 73, 0.28) !important;
      border-color: rgba(56, 189, 248, 0.22) !important;
      color: #cffafe !important;
      text-shadow: none;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="section hero-section">
      <div class="hero-scene">
        <div class="physical-hero-layout">
          <div class="physical-left-stack">
            <article class="diagram-panel">
              <!-- 左上卡片标题：单模态接入 -->
              <div class="panel-header">单模态接入</div>
              <div class="physical-canvas">
                <!-- 左上卡片 SVG 画布：物理层单模态接入场景 -->
                <svg class="physical-card-svg" viewBox="28 48 662 362" xmlns="http://www.w3.org/2000/svg" aria-label="物理层单模态接入场景">
                  <defs>
                    <!-- 左上红色攻击箭头的箭头定义 -->
                    <marker id="left-arrow-attack" markerWidth="4" markerHeight="2.4" refX="3" refY="1.2" orient="auto">
                      <!-- 左上红色攻击箭头的三角箭头形状 -->
                      <polygon points="0 0, 4 1.2, 0 2.4" fill="#ef4444" />
                    </marker>
                    <!-- 左上黑色连接箭头的箭头定义 -->
                    <marker id="left-arrow-neutral" markerWidth="4" markerHeight="2.4" refX="3" refY="1.2" orient="auto">
                      <!-- 左上黑色连接箭头的三角箭头形状 -->
                      <polygon points="0 0, 4 1.2, 0 2.4" fill="#fbbf24" />
                    </marker>
                    <marker id="left-arrow-orange" markerWidth="4" markerHeight="2.4" refX="3" refY="1.2" orient="auto">
                      <!-- 左上黑色连接箭头的三角箭头形状 -->
                      <polygon points="0 0, 4 1.2, 0 2.4" fill="#dd6b20" />
                    </marker>
                    <!-- 左上灰色虚线箭头的箭头定义 -->
                    <marker id="left-arrow-soft" markerWidth="4" markerHeight="2.4" refX="3" refY="1.2" orient="auto">
                      <!-- 左上灰色虚线箭头的三角箭头形状 -->
                      <polygon points="0 0, 4 1.2, 0 2.4" fill="#64748b" />
                    </marker>
                  </defs>

                  <!-- 左上攻击者图标 -->
                  <image href="../assets/physics/attacker.png" x="30" y="90" width="94" height="74" />
                  <!-- 左上 WiFi 干扰图标 -->
                  <image href="../assets/wi-fi.png" x="172" y="78" width="46" height="46" />
                  <!-- 左上“物理层屏蔽”文字 -->
                  <text x="160" y="124" fill="#c1121f" font-size="16" font-weight="700">物理层屏蔽</text>
                  <!-- 左上从攻击者指向接入点的红色攻击虚线箭头 -->
                  <line x1="132" y1="136" x2="260" y2="136" stroke="#ef4444" stroke-width="5" stroke-dasharray="16 4" marker-end="url(#left-arrow-attack)" />

                  <!-- 左上接入点塔台图片 -->
                  <image href="../assets/physics/access-point.png" x="254" y="44" width="130" height="231" preserveAspectRatio="xMidYMid meet" />
                  <!-- 左上接入点文字标签 -->
                  <text x="319" y="78" font-size="17" font-weight="700" text-anchor="middle" style="fill:#dbeafe !important;">接入点</text>


                  <!-- 左上 WiFi 干扰图标 -->
                  <image href="../assets/wi-fi.png" x="132" y="152" width="46" height="46" />
                  <!-- 左上橙色告警标题：认证屏蔽 -->
                  <text x="182" y="182" font-size="17" font-weight="700" style="fill:#fb923c !important;">接入失败</text>
                  <!-- 左上第一行失败说明：随机退避 -->
                  <text x="80" y="255" font-size="17" style="fill:#dbeafe !important;">随机退避</text>
                  <!-- 左上第二行失败说明：接入失败 -->
                  <text x="80" y="277" font-size="17" style="fill:#dbeafe !important;">接入</text>

                                    <!-- 左上第一行失败说明：随机退避 -->
                  <text x="240" y="319" font-size="15" style="fill:#dbeafe !important;">同步接入</text>
                  <!-- 左上第二行失败说明：接入失败 -->
                  <text x="240" y="339" font-size="15" style="fill:#dbeafe !important;">失败记录</text>

                  <!-- 左上 UAV-4 外层卡片框 -->
                  <rect x="154" y="216" width="102" height="84" rx="8" fill="rgba(255,255,255,0.58)" stroke="#dd6b20" stroke-width="2.5" />
                  <!-- 左上 UAV-4 实拍图 -->
                  <image href="../assets/physics/drone-photo.png" x="166" y="239" width="78" height="54" />
                  <!-- 左上 UAV-4 标题文字 -->
                  <text x="205" y="235" font-size="16" font-weight="700" text-anchor="middle" style="fill:#dbeafe !important;">UAV-4</text>

  <script>
    (function () {
      const statusEl = document.getElementById('flow-status');
      const buttons = document.querySelectorAll('.mode-btn');
      const logEls = {
        centralized: document.querySelector('.log-box:nth-child(1) .log-content'),
        distributed: document.querySelector('.log-box:nth-child(2) .log-content')
      };
      const paths = {
        seg1: document.getElementById('active-seg-1'),
        top: document.getElementById('active-seg-top'),
        bottom: document.getElementById('active-seg-bottom')
      };
      const nodes = {
        start: document.getElementById('node-start'),
        multi: document.getElementById('node-multi'),
        switchNode: document.getElementById('node-switch'),
        single: document.getElementById('node-single'),
        backoff: document.getElementById('node-backoff')
      };

      const PAUSE_MS = 900;
      const NODE_BASE_R = 10;
      const NODE_ACTIVE_R = 17;
      const DURATION_MS = {
        seg1: 1200,
        branchPart1: 1000,
        branchPart2: 1000
      };

      let animationToken = 0;

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function setButtonState(mode) {
        buttons.forEach((button) => {
          button.classList.toggle('is-active', button.dataset.mode === mode);
        });
      }

      function nowStamp() {
        const now = new Date();
        return now.toLocaleTimeString('zh-CN', { hour12: false });
      }

      function appendLog(mode, role, message) {
        const target = logEls[mode];
        if (!target) return;

        const item = document.createElement('li');
        const line = document.createElement('span');
        const time = document.createElement('span');
        const device = document.createElement('span');
        const content = document.createElement('span');

        line.className = 'log-line';
        time.className = 'log-time';
        device.className = 'log-device';
        content.className = 'log-message';
        time.textContent = '[' + nowStamp() + ']';
        device.textContent = '[' + role + ']';
        content.textContent = message;

        line.appendChild(time);
        line.appendChild(device);
        line.appendChild(content);
        item.appendChild(line);
        target.appendChild(item);
        target.scrollTop = target.scrollHeight;
      }

      function clearActiveLog(mode) {
        const target = logEls[mode];
        if (target) {
          target.innerHTML = '';
        }
      }

      function enhanceStaticLogs() {
        document.querySelectorAll('.log-content li').forEach((item) => {
          if (item.querySelector('.log-line')) return;

          const raw = item.textContent.trim();
          const match = raw.match(/^(\[[^\]]+\])\s*(.*)$/);
          const line = document.createElement('span');
          const time = document.createElement('span');
          const device = document.createElement('span');
          const message = document.createElement('span');

          line.className = 'log-line';
          time.className = 'log-time';
          device.className = 'log-device';
          message.className = 'log-message';
          time.textContent = match ? match[1] : '[--:--:--]';
          device.textContent = '[物理层]';
          message.textContent = match ? match[2] : raw;

          line.appendChild(time);
          line.appendChild(device);
          line.appendChild(message);
          item.textContent = '';
          item.appendChild(line);
        });
      }

      function initPath(path) {
        const total = path.getTotalLength();
        path.dataset.total = String(total);
        path.style.transition = 'none';
        path.style.strokeDasharray = String(total);
        path.style.strokeDashoffset = String(total);
      }

      function resetPaths() {
        Object.values(paths).forEach(initPath);
      }

      function resetNodes() {
        Object.values(nodes).forEach((node) => {
          node.classList.remove('is-active', 'is-visited');
          node.setAttribute('r', String(NODE_BASE_R));
        });
      }

      function revealPathSegment(path, startOffset, endOffset, duration) {
        return new Promise((resolve) => {
          path.style.transition = 'none';
          path.style.strokeDashoffset = startOffset;
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              path.style.transition = 'stroke-dashoffset ' + duration + 'ms linear';
              path.style.strokeDashoffset = endOffset;
            });
          });
          setTimeout(resolve, duration + 40);
        });
      }

      async function pauseAtNode(node, label, token) {
        if (token !== animationToken) return;
        node.classList.add('is-visited', 'is-active');
        node.setAttribute('r', String(NODE_ACTIVE_R));
        statusEl.textContent = '\u6b63\u5728\u6267\u884c\uff1a' + label;
        await sleep(PAUSE_MS);
        if (token !== animationToken) return;
        node.classList.remove('is-active');
        node.setAttribute('r', String(NODE_BASE_R));
      }

      async function runFlow(mode) {
        animationToken += 1;
        const token = animationToken;

        setButtonState(mode);
        resetPaths();
        resetNodes();
        clearActiveLog(mode);

        const flowName =
          mode === 'distributed'
            ? '区块链增强多模态接入'
            : '单模态接入';
        statusEl.textContent = '\u6d41\u7a0b\u5b8c\u6210\uff1a' + flowName;
          appendLog(mode, '测试控制器', flowName + '\u6d41\u7a0b\u6f14\u793a\u5b8c\u6210\u3002');
        await sleep(300);

        await revealPathSegment(paths.seg1, paths.seg1.dataset.total, 0, DURATION_MS.seg1);
        appendLog(mode, 'UAV-4', '发起接入请求，接入点开始检测当前链路状态。');
        await pauseAtNode(nodes.start, '接入请求', token);
        if (token !== animationToken) return;

        if (mode === 'distributed') {
          const totalTop = Number(paths.top.dataset.total);
          const offset1 = totalTop * 0.5;
          await revealPathSegment(paths.top, totalTop, offset1, DURATION_MS.branchPart1);
          appendLog(mode, '区块链节点', '读取 WiFi 失效记录，触发多模态联合认证。');
          appendLog(mode, 'UAV-4', 'LoRa信号受干扰，尝试切换至WiFi模态接入。');
          await pauseAtNode(nodes.multi, '多模态认证', token);
          if (token !== animationToken) return;

          await revealPathSegment(paths.top, offset1, 0, DURATION_MS.branchPart2);
          appendLog(mode, '接入点', '切换至 LoRa / 多站点联合接入模式，认证反馈生成。');
          appendLog(mode, '接入点', '多模态切换接入成功，接入成功率显著提升。');
          await pauseAtNode(nodes.switchNode, '接入方式切换', token);
        } else {
          const totalBottom = Number(paths.bottom.dataset.total);
          const offset2 = totalBottom * 0.5;
          await revealPathSegment(paths.bottom, totalBottom, offset2, DURATION_MS.branchPart1);
          appendLog(mode, '接入点', 'WiFi 通道持续受干扰，单模态认证失败。');
          appendLog(mode, '接入点', '信号屏蔽设备对LoRa信号进行屏蔽，固定单模态无法切换。');
          await pauseAtNode(nodes.single, '单模态认证', token);
          if (token !== animationToken) return;

          await revealPathSegment(paths.bottom, offset2, 0, DURATION_MS.branchPart2);
          appendLog(mode, '平台', '同步接入失败记录，UAV-4 进入随机退避接入阶段。');
          await pauseAtNode(nodes.backoff, '退避接入', token);
        }

        if (token === animationToken) {
          statusEl.textContent = '\u6d41\u7a0b\u5b8c\u6210\uff1a' + flowName;
          appendLog(mode, '测试控制器', flowName + '\u6d41\u7a0b\u6f14\u793a\u5b8c\u6210\u3002');
          if (mode === 'distributed') {
            appendLog(mode, '测试控制器', '多模态切换接入比传统固定单模态接入的频谱接入成功率提升至少20%。');
          } else {
            appendLog(mode, '测试控制器', '固定单模态接入在信号干扰下成功率明显低于多模态切换方案。');
          }
        }
      }

      buttons.forEach((button) => {
        button.addEventListener('click', () => {
          runFlow(button.dataset.mode);
        });
      });
      resetPaths();
      resetNodes();
    })();
  </script>
</body>
</html>
