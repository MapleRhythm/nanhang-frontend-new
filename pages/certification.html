<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>可信安全认证</title>
  <style>
    * { box-sizing: border-box; }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      background: #ffffff;
      color: #1f2937;
    }

    .page {
      height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }

    .section {
      padding: 16px;
      min-height: 0;
    }

    .section + .section {
      border-top: 1px dashed #cbd5e1;
    }

    .page > .section:last-child {
      overflow: hidden;
    }

    .hero-section {
      padding: 40px 10px 6px;
      background: #ffffff;
      border: 0;
      border-radius: 0;
    }

    .cert-hero {
      width: 100%;
      height: auto;
      display: grid;
      grid-template-columns: 4.2fr 1.35fr 7.3fr;
      gap: 14px;
      align-items: start;
    }

    .hero-left-stack {
      display: grid;
      grid-template-rows: auto auto;
      gap: 8px;
    }

    .hero-card {
      position: relative;
      border: 2px solid #2b2b2b;
      background: #ffffff;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.12);
      overflow: visible;
      padding: 3px;
    }

    .hero-tag {
      /* 左上角浮动标签：相对 .hero-card 左上角向上偏移 */
      position: absolute;
      left: 14px;
      top: -46px;
      margin: 0;
      padding: 15px 32px 10px;
      background: #0f4f77;
      color: #fff;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 6px 12px rgba(15, 79, 119, 0.28);
      line-height: 1;
      white-space: nowrap;
    }

    .hero-diagram {
      width: 100%;
      height: 100%;
      display: block;
    }

    .hero-left .hero-diagram {
      height: 308px;
    }

    .hero-right .hero-diagram {
      height: 450px;
      aspect-ratio: 860 / 420;
    }

    .hero-right {
      width: 90%;
      justify-self: end;
      padding: 0;
    }

    .hero-arrow {
      display: flex;
      justify-content: center;
      align-items: center;
      padding-top: 152px;
      position: relative;
      z-index: 6;
      overflow: visible;
    }

    .hero-arrow-combo {
      position: relative;
      width: 160px;
      height: 46px;
      background: #d66b16;
      border: none;
      border-radius: 0;
      box-shadow: 0 4px 9px rgba(100, 45, 14, 0.3);
      display: grid;
      place-items: center;
      padding-right: 30px;
      overflow: visible;
      z-index: 6;
    }

    .hero-arrow-combo::before {
      content: none;
    }

    .hero-arrow-combo::after {
      content: "";
      position: absolute;
      right: -20px;
      top: -20px;
      width: 0;
      height: 0;
      border-top: 45px solid transparent;
      border-bottom: 45px solid transparent;
      border-left: 25px solid #d66b16;
    }

    .hero-boost-badge {
      margin: 0;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.15;
      text-align: center;
      white-space: nowrap;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.22);
    }

    .hero-arrow-main {
      position: absolute;
      right: 2px;
      top: -6px;
      transform: scaleX(-1);
      width: 58px;
      z-index: 3;
      filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.28));
    }

    .hero-summary {
      padding: 10px 14px 10px 12px;
      color: #0f172a;
      background: #ffffff;
      border: 1px solid #dbe7f5;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08);
    }

    .hero-summary-title {
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 800;
      color: #0b3a83;
      line-height: 1.2;
      letter-spacing: 0.3px;
    }

    .hero-summary-list {
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 16px;
      line-height: 1.42;
      font-weight: 650;
    }

    .hero-summary-list li {
      position: relative;
      margin: 3px 0;
      padding-left: 18px;
      color: #0f172a;
    }

    .hero-summary-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.58em;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(180deg, #22d3ee 0%, #2563eb 100%);
      box-shadow: 0 0 8px rgba(37, 99, 235, 0.35);
    }

    .bottom-layout {
      display: grid;
      grid-template-columns: 3.6fr 1.45fr 4.95fr;
      gap: 16px;
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }

    .left-panel {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #f9fafb;
      padding: 14px;
      display: grid;
      grid-template-rows: auto auto auto auto;
      gap: 12px;
      min-height: 0;
      overflow: hidden;
    }

    .mode-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .test-config {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .test-config-label {
      font-size: 12px;
      font-weight: 600;
      color: #334155;
      white-space: nowrap;
    }

    .test-count-input {
      width: 180px;
      max-width: 100%;
      height: 34px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #ffffff;
      color: #0f172a;
      font-size: 13px;
      padding: 0 10px;
      outline: none;
    }

    .test-count-input:focus {
      border-color: #0f766e;
      box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.14);
    }

    .mode-btn {
      border: 1px solid #0f5f82;
      border-radius: 8px;
      background: #186487;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      padding: 11px 8px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .mode-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(24, 100, 135, 0.25);
    }

    .mode-btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      box-shadow: none;
      transform: none;
    }

    .mode-btn.start-btn {
      border-color: #0a7661;
      background: #0f8a72;
    }

    .mode-btn.is-active {
      background: #0d4f6d;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.3);
    }

    .mode-btn.is-done {
      background: #0e7490;
      border-color: #0e7490;
    }

    .flow-wrap {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
      padding: 10px;
      height: auto;
      overflow: hidden;
      display: flex;
    }

    .flow-svg {
      width: 100%;
      height: auto;
      aspect-ratio: 900 / 320;
    }

    .flow-base {
      fill: none;
      stroke: #8ab8de;
      stroke-width: 20;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .flow-active {
      fill: none;
      stroke: #2563eb;
      stroke-width: 30;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 4px rgba(37, 99, 235, 0.6));
    }

    .flow-node {
      fill: #ffffff;
      stroke: #93a4b5;
      stroke-width: 3;
      transition: fill 0.3s ease, stroke 0.3s ease, r 0.3s ease;
    }

    .flow-node.is-visited {
      fill: #ffffff;
      stroke: #2563eb;
    }

    .flow-node.is-active {
      fill: #ffffff;
      stroke: #1d4ed8;
      stroke-width: 4;
    }

    .flow-label {
      fill: #111827;
      font-size: 24px;
      font-weight: 600;
      user-select: none;
    }

    .flow-label-small {
      fill: #111827;
      font-size: 22px;
      font-weight: 600;
      user-select: none;
    }

    .flow-status {
      margin: 0;
      min-height: 22px;
      font-size: 14px;
      color: #1d4ed8;
      font-weight: 600;
    }

    .latency-panel {
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #f8fafc;
      padding: 10px;
      display: grid;
      grid-template-rows: repeat(3, minmax(0, 1fr));
      gap: 10px;
      min-height: 0;
      overflow: hidden;
    }

    .latency-card {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #ffffff;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 6px;
      padding: 8px 6px;
      text-align: center;
    }

    .latency-label {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      color: #2563eb;
      line-height: 1.2;
      letter-spacing: 0.5px;
      text-shadow: 0 0 8px rgba(37, 99, 235, 0.24);
    }

    .latency-value {
      margin: 0;
      font-size: 30px;
      font-weight: 800;
      color: #0ea5e9;
      line-height: 1;
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      text-shadow: 0 0 10px rgba(14, 165, 233, 0.3);
    }

    .latency-value.improvement {
      color: #06b6d4;
      text-shadow: 0 0 10px rgba(6, 182, 212, 0.34);
    }

    .right-panel {
      /* 右侧日志区的对比提示需要绝对定位覆盖在两栏中间 */
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: minmax(0, 1fr) 96px;
      grid-template-areas:
        "centralized distributed"
        "comparison comparison";
      gap: 10px;
      min-height: 0;
      align-items: stretch;
      overflow: hidden;
    }

    .centralized-box {
      grid-area: centralized;
    }

    .distributed-box {
      grid-area: distributed;
    }

    .log-box {
      border: 1px solid #111827;
      border-radius: 10px;
      background: #05070a;
      color: #3cff84;
      padding: 10px 10px 8px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 8px;
      min-height: 0;
      overflow: hidden;
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      height: 100%;
    }

    .log-title {
      margin: 0;
      font-size: 15px;
      color: #7dffab;
      border-bottom: 1px solid #1f2937;
      padding-bottom: 8px;
    }

    .log-content {
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 12px;
      line-height: 1.55;
      overflow-y: scroll;
      overflow-x: hidden;
      scrollbar-gutter: stable;
      scrollbar-width: thin;
      scrollbar-color: rgba(125, 255, 171, 0.55) rgba(17, 24, 39, 0.65);
      white-space: pre-wrap;
    }

    .log-content::-webkit-scrollbar {
      width: 10px;
    }

    .log-content::-webkit-scrollbar-track {
      background: rgba(17, 24, 39, 0.65);
      border-radius: 10px;
    }

    .log-content::-webkit-scrollbar-thumb {
      background: rgba(125, 255, 171, 0.55);
      border-radius: 10px;
      border: 2px solid rgba(17, 24, 39, 0.65);
    }

    .log-content li {
      margin: 0 0 6px;
      word-break: break-word;
    }

    .log-metric {
      margin: 0;
      padding-top: 6px;
      border-top: 1px dashed rgba(125, 255, 171, 0.35);
      font-size: 12px;
      font-weight: 700;
      color: #93c5fd;
      line-height: 1.4;
    }

    .comparison-overlay {
      /* 对比浮层：默认位于右侧面板中心偏下，覆盖两列日志中间 */
      position: absolute;
      left: 50%;
      top: 56%;
      transform: translate(-50%, -50%);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      z-index: 5;
      width: min(430px, 100%);
      padding-top: 2px;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .comparison-overlay.is-visible {
      visibility: visible;
      opacity: 1;
    }

    .comparison-text {
      margin: 0;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(239, 68, 68, 0.55);
      background: rgba(255, 255, 255, 0.97);
      box-shadow: 0 4px 14px rgba(220, 38, 38, 0.18);
      color: #dc2626;
      font-size: 32.5px;
      line-height: 1.15;
      font-weight: 700;
      white-space: nowrap;
    }

    .comparison-arrow {
      width: min(360px, 100%);
      height: 72px;
      display: block;
      filter: drop-shadow(0 2px 5px rgba(220, 38, 38, 0.28));
    }

    @media (max-width: 1000px) {
      .hero-section {
        padding: 16px 12px 10px;
      }

      .cert-hero {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .hero-tag {
        position: static;
        display: inline-block;
        margin: 10px 0 8px 10px;
      }

      .hero-arrow {
        padding-top: 0;
        min-height: 86px;
      }

      .hero-arrow-main {
        width: 50px;
        top: -8px;
        right: 4px;
      }

      .hero-boost-badge {
        font-size: 16px;
      }

      .hero-card {
        padding: 3px;
      }

      .hero-left .hero-diagram,
      .hero-right .hero-diagram {
        height: auto;
      }

      .hero-right {
        width: 100%;
        justify-self: stretch;
      }

      .bottom-layout {
        grid-template-columns: 1fr;
      }

      .right-panel {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) minmax(0, 1fr) 86px;
        grid-template-areas:
          "centralized"
          "distributed"
          "comparison";
      }

      .comparison-overlay {
        margin: 4px auto 0;
        width: min(300px, 100%);
      }

      .comparison-arrow {
        width: min(260px, 100%);
        height: 64px;
      }
    }

    @media (max-width: 760px) {
      .mode-buttons {
        grid-template-columns: 1fr;
      }

      .test-count-input {
        width: 100%;
      }

      .flow-label {
        font-size: 19px;
      }

      .flow-label-small {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <!-- 页面顶部区域：三列布局（左流程图 + 中间效率箭头 + 右流程图） -->
    <section class="section hero-section">
      <div class="cert-hero">
        <!-- 顶部左列：集中式认证流程图 + 优势说明 -->
        <div class="hero-left-stack">
          <!-- 左上：集中式身份认证流程图卡片 -->
          <article class="hero-card hero-left">
            <h3 class="hero-tag">&#38598;&#20013;&#24335;&#36523;&#20221;&#35748;&#35777;</h3>
            <svg class="hero-diagram" viewBox="0 0 620 360" xmlns="http://www.w3.org/2000/svg" aria-label="集中式身份认证流程图">
              <defs>
                <marker id="left-arrow-orange" markerWidth="6" markerHeight="6" refX="5.5" refY="3" orient="auto">
                  <path d="M0,0 L6,3 L0,6 Z" fill="#ef7d2c" />
                </marker>
                <marker id="left-arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
                  <path d="M0,0 L8,4 L0,8 Z" fill="#3c74c9" />
                </marker>
              </defs>

              <ellipse cx="152" cy="236" rx="144" ry="118" fill="#efd9c8" /> <!-- 椭圆中心(152,236)，半径(rx=144, ry=118) -->
              <g stroke="#111" stroke-width="3" stroke-dasharray="10 8">
                <line x1="170" y1="186" x2="85" y2="240" /> <!-- 连线起点(174,186) 终点(70,246) -->
                <line x1="188" y1="206" x2="128" y2="290" /> <!-- 连线起点(188,206) 终点(120,314) -->
                <line x1="210" y1="210" x2="220" y2="270" /> <!-- 连线起点(206,194) 终点(220,290) -->
              </g>

              <image href="../assets/certification/icons/radio.png" x="168" y="156" width="58" height="58" /> <!-- 图标左上角(168,156)，尺寸58x58 -->
              <text x="166" y="152" font-size="16" fill="#111">&#25509;&#20837;&#28857;</text> <!-- 文本基线起点(166,152) -->

              <image href="../assets/certification/icons/drone-m210.png" x="46" y="238" width="52" height="34" /> <!-- UAV-1图标左上角(46,238)，尺寸52x34 -->
              <text x="48" y="286" font-size="17">UAV-1</text> <!-- UAV-1标签基线起点(48,286) -->
              <image href="../assets/certification/icons/drone-m210.png" x="104" y="290" width="52" height="34" /> <!-- UAV-2图标左上角(104,290)，尺寸52x34 -->
              <text x="110" y="338" font-size="17">UAV-2</text> <!-- UAV-2标签基线起点(110,338) -->
              <image href="../assets/certification/icons/drone-m210.png" x="200" y="273" width="52" height="34" /> <!-- UAV-3图标左上角(200,273)，尺寸52x34 -->
              <text x="206" y="321" font-size="17">UAV-3</text> <!-- UAV-3标签基线起点(206,321) -->

              <image href="../assets/certification/icons/drone-quad.png" x="468" y="238" width="62" height="62" /> <!-- UAV-4图标左上角(468,238)，尺寸62x62 -->
              <text x="474" y="319" font-size="17">UAV-4</text> <!-- UAV-4标签基线起点(474,309) -->

              <image href="../assets/certification/icons/gov.png" x="220" y="10" width="56" height="56" /> <!-- 根CA1图标左上角(220,10)，尺寸56x56 -->
              <image href="../assets/certification/icons/flag-red.png" x="268" y="29" width="16" height="16" /> <!-- 根CA1旗标左上角(268,29)，尺寸16x16 -->
              <text x="286" y="56" font-size="16">&#26681;CA1</text> <!-- 根CA1文字基线起点(236,96) -->

              <image href="../assets/certification/icons/gov.png" x="416" y="34" width="56" height="56" /> <!-- 根CA2图标左上角(416,34)，尺寸56x56 -->
              <image href="../assets/certification/icons/flag-red.png" x="464" y="53" width="16" height="16" /> <!-- 根CA2旗标左上角(464,53)，尺寸16x16 -->
              <text x="423" y="110" font-size="16">&#26681;CA2</text> <!-- 根CA2文字基线起点(406,114) -->

              <image href="../assets/certification/icons/gov.png" x="468" y="118" width="52" height="52" /> <!-- 子CA2图标左上角(468,118)，尺寸52x52 -->
              <text x="466" y="192" font-size="16">&#23376;CA2</text> <!-- 子CA2文字基线起点(466,192) -->

              <g stroke="#ef7d2c" stroke-width="3.2" marker-end="url(#left-arrow-orange)">
                <line x1="222" y1="162" x2="242" y2="71" /> <!-- 箭头线起点(222,162) 终点(232,56) -->
                <line x1="222" y1="162" x2="410" y2="84" /> <!-- 箭头线起点(222,162) 终点(416,84) -->
                <line x1="222" y1="162" x2="462" y2="152" /> <!-- 箭头线起点(222,162) 终点(462,152) -->
              </g>

              <rect x="196" y="93" width="118" height="32" rx="4" fill="#ffffff" opacity="0.96" /> <!-- step2底板左上角(236,124)，尺寸118x32 -->
              <text x="202" y="105" font-size="11.2" fill="#d8671b">step3: &#35831;&#27714;&#39564;&#35777;</text> <!-- step3文案基线起点(202,118) -->
              <text x="202" y="120" font-size="11.2" fill="#d8671b">&#26681;CA2&#20132;&#21449;&#35777;&#20070;</text> <!-- step3补充文案基线起点(202,130) -->

              <rect x="280" y="105" width="118" height="32" rx="4" fill="#ffffff" opacity="0.96" /> <!-- step2底板左上角(236,124)，尺寸118x32 -->
              <text x="286" y="117" font-size="11.2" fill="#d8671b">step2: &#35831;&#27714;&#39564;&#35777;</text> <!-- step2文案基线起点(242,136) -->
              <text x="286" y="129" font-size="11.2" fill="#d8671b">&#23376;CA2&#35777;&#20070;</text> <!-- step2补充文案基线起点(242,148) -->

              <rect x="318" y="150" width="89" height="32" rx="4" fill="#ffffff" opacity="0.96" /> <!-- step1底板左上角(318,154)，尺寸118x32 -->
              <text x="324" y="157" font-size="11.2" fill="#d8671b">step1: &#35831;&#27714;&#39564;&#35777;</text> <!-- step1文案基线起点(324,166) -->
              <text x="324" y="169" font-size="11.2" fill="#d8671b">UAV-2&#35777;&#20070;</text> <!-- step1补充文案基线起点(324,178) -->

              <line x1="228" y1="180" x2="460" y2="269" stroke="#3c74c9" stroke-width="3.4" marker-end="url(#left-arrow-blue)" /> <!-- 跨域认证线起点(212,220) 终点(476,264) -->
              <text x="294" y="266" font-size="15" font-weight="600" fill="#111" transform="rotate(-8 294 266)">
                &#36328;&#22495;&#35748;&#35777;
              </text>
            </svg>
          </article>

  <script>
    (function () {
      const DEFAULT_SAMPLE_COUNT = 10;
      const MIN_SAMPLE_COUNT = 1;
      const MAX_SAMPLE_COUNT = 100;
      const NODE_BASE_R = 10;
      const NODE_ACTIVE_R = 17;
      const NON_KEY_STAGE_MS = [400, 1000];
      const AUTH_STAGE_MS = {
        distributed: [500, 700],
        centralized: [900, 1100]
      };
      const LATENCY_RANGE = {
        distributed: [0.5, 0.7],
        centralized: [0.9, 1.1]
      };

      const startBtn = document.getElementById('start-test-btn');
      const modeButtons = document.querySelectorAll('[data-mode]');
      const distributedBtn = document.getElementById('distributed-btn');
      const centralizedBtn = document.getElementById('centralized-btn');
      const sampleCountInput = document.getElementById('sample-count-input');

      const statusEl = document.getElementById('flow-status');
      const distributedMetricsEl = document.getElementById('distributed-metrics');
      const centralizedMetricsEl = document.getElementById('centralized-metrics');
      const summaryCentralizedEl = document.getElementById('summary-centralized-value');
      const summaryDistributedEl = document.getElementById('summary-distributed-value');
      const summaryImprovementEl = document.getElementById('summary-improvement-value');
      const logEls = {
        distributed: document.getElementById('distributed-log'),
        centralized: document.getElementById('centralized-log')
      };

      const comparisonOverlay = document.getElementById('comparison-overlay');
      const comparisonText = document.getElementById('comparison-text');

      const paths = {
        seg1: document.getElementById('active-seg-1'),
        seg2: document.getElementById('active-seg-2'),
        top: document.getElementById('active-seg-top'),
        bottom: document.getElementById('active-seg-bottom')
      };

      const nodes = {
        issue: document.getElementById('node-issue'),
        request: document.getElementById('node-request'),
        distributed: document.getElementById('node-distributed'),
        centralized: document.getElementById('node-centralized')
      };

      function createModeState() {
        return {
          samples: [],
          avgLatency: null,
          completedCount: 0,
          targetCount: DEFAULT_SAMPLE_COUNT,
          running: false,
          done: false
        };
      }

      const state = {
        session: {
          started: false,
          roundId: 0,
          baseTime: 0
        },
        distributed: createModeState(),
        centralized: createModeState(),
        comparison: {
          ready: false,
          improvementPercent: null
        },
        runningMode: null,
        animationToken: 0
      };

      function randomInRange(min, max) {
        return min + Math.random() * (max - min);
      }

      function randomMs(range) {
        return Math.round(randomInRange(range[0], range[1]));
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function nowStamp() {
        const d = new Date();
        const ms = String(d.getMilliseconds()).padStart(3, '0');
        return d.toLocaleTimeString('zh-CN', { hour12: false }) + '.' + ms;
      }

      function formatSeconds(sec) {
        return sec.toFixed(3);
      }

      function appendLog(mode, message) {
        const ul = logEls[mode];
        const li = document.createElement('li');
        li.textContent = '[' + nowStamp() + '] ' + message;
        ul.appendChild(li);
        ul.scrollTop = ul.scrollHeight;
      }

      function appendBothLogs(message) {
        appendLog('distributed', message);
        appendLog('centralized', message);
      }

      function clearLogs() {
        Object.values(logEls).forEach((ul) => {
          ul.innerHTML = '';
        });
      }

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function getMetricText(modeLabel, modeState) {
        const avgText = modeState.avgLatency === null ? '--' : formatSeconds(modeState.avgLatency) + 's';
        return modeLabel + '：已完成 ' + modeState.completedCount + '/' + modeState.targetCount + '，当前平均时延 ' + avgText;
      }

      function getAvgLatencyText(modeState) {
        return modeState.avgLatency === null ? '--' : formatSeconds(modeState.avgLatency) + 's';
      }

      function getImprovementText() {
        const dist = state.distributed.avgLatency;
        const cent = state.centralized.avgLatency;
        if (dist === null || cent === null || cent <= 0) {
          return '--';
        }
        const improvement = ((cent - dist) / cent) * 100;
        return improvement.toFixed(2) + '%';
      }

      function updateMetricsPanel() {
        distributedMetricsEl.textContent = getMetricText('分布式', state.distributed);
        centralizedMetricsEl.textContent = getMetricText('集中式', state.centralized);
        summaryCentralizedEl.textContent = getAvgLatencyText(state.centralized);
        summaryDistributedEl.textContent = getAvgLatencyText(state.distributed);
        summaryImprovementEl.textContent = getImprovementText();
      }

      function readTargetCount(mode) {
        const raw = sampleCountInput.value.trim();
        if (raw === '') {
          return DEFAULT_SAMPLE_COUNT;
        }

        if (!/^\d+$/.test(raw)) {
          setStatus('输入错误：总测试次数必须为整数（1-100）');
          appendLog(mode, '[测试控制器] 输入错误：总测试次数必须为整数（1-100）。');
          return null;
        }

        const value = Number(raw);
        if (value < MIN_SAMPLE_COUNT || value > MAX_SAMPLE_COUNT) {
          setStatus('输入错误：总测试次数范围应为 1-100');
          appendLog(mode, '[测试控制器] 输入错误：总测试次数范围应为 1-100。');
          return null;
        }

        return value;
      }

      function hideComparison() {
        state.comparison.ready = false;
        state.comparison.improvementPercent = null;
        comparisonText.textContent = '';
        comparisonOverlay.classList.remove('is-visible');
      }

      function showComparison() {
        const dist = state.distributed.avgLatency;
        const cent = state.centralized.avgLatency;
        if (dist === null || cent === null) {
          return;
        }
        const improvement = ((cent - dist) / cent) * 100;
        state.comparison.ready = true;
        state.comparison.improvementPercent = improvement;
        comparisonText.textContent =
          '效率提升 ' + improvement.toFixed(2) + '% | 分布式 ' + formatSeconds(dist) + 's vs 集中式 ' + formatSeconds(cent) + 's';
        comparisonOverlay.classList.add('is-visible');
      }

      function handleComparisonResult() {
        if (!state.distributed.done || !state.centralized.done) {
          return;
        }

        if (state.distributed.targetCount !== state.centralized.targetCount) {
          hideComparison();
          setStatus('样本数不一致，无法对比，请重新测试并保持一致');
          appendBothLogs(
            '[对比结果] 样本数不一致（分布式' +
              state.distributed.targetCount +
              '次，集中式' +
              state.centralized.targetCount +
              '次），无法计算效率提升。'
          );
          return;
        }

        showComparison();
        setStatus('步骤4/4：对比完成，分布式跨域认证效率提升已生成');
      }

      function setButtonsState() {
        const busy = state.runningMode !== null;
        startBtn.disabled = busy;
        sampleCountInput.disabled = busy;

        const distDisabled = !state.session.started || busy || state.distributed.done;
        const centDisabled = !state.session.started || busy || state.centralized.done;
        distributedBtn.disabled = distDisabled;
        centralizedBtn.disabled = centDisabled;

        distributedBtn.classList.toggle('is-active', state.runningMode === 'distributed');
        centralizedBtn.classList.toggle('is-active', state.runningMode === 'centralized');
        distributedBtn.classList.toggle('is-done', state.distributed.done);
        centralizedBtn.classList.toggle('is-done', state.centralized.done);
      }

      function initPath(path) {
        const total = path.getTotalLength();
        path.dataset.total = String(total);
        path.style.transition = 'none';
        path.style.strokeDasharray = String(total);
        path.style.strokeDashoffset = String(total);
      }

      function hidePath(path) {
        path.style.transition = 'none';
        path.style.strokeDashoffset = path.dataset.total;
      }

      function showPath(path) {
        path.style.transition = 'none';
        path.style.strokeDashoffset = '0';
      }

      function setNode(nodeKey, visited, active) {
        const node = nodes[nodeKey];
        node.classList.toggle('is-visited', Boolean(visited));
        node.classList.toggle('is-active', Boolean(active));
        node.setAttribute('r', String(active ? NODE_ACTIVE_R : NODE_BASE_R));
      }

      function resetFlow() {
        Object.values(paths).forEach(initPath);
        Object.keys(nodes).forEach((key) => setNode(key, false, false));
      }

      function resetSampleFlowVisual() {
        hidePath(paths.seg2);
        hidePath(paths.top);
        hidePath(paths.bottom);
        setNode('request', false, false);
        setNode('distributed', false, false);
        setNode('centralized', false, false);
        setNode('issue', true, false);
      }

      function animatePath(path, duration, token) {
        return new Promise((resolve) => {
          if (token !== state.animationToken) {
            resolve(false);
            return;
          }

          path.style.transition = 'none';
          path.style.strokeDashoffset = path.dataset.total;

          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              path.style.transition = 'stroke-dashoffset ' + duration + 'ms linear';
              path.style.strokeDashoffset = '0';
            });
          });

          window.setTimeout(() => {
            resolve(token === state.animationToken);
          }, duration + 30);
        });
      }

      async function pulseNode(nodeKey, keepVisited, token) {
        if (token !== state.animationToken) {
          return false;
        }
        setNode(nodeKey, true, true);
        await sleep(260);
        if (token !== state.animationToken) {
          return false;
        }
        setNode(nodeKey, keepVisited, false);
        return true;
      }

      async function runInitialization() {
        state.runningMode = 'init';
        state.animationToken += 1;
        const token = state.animationToken;
        setButtonsState();

        clearLogs();
        hideComparison();
        resetFlow();

        appendBothLogs('[测试控制器] 新一轮认证测试启动，轮次 ID=' + state.session.roundId + '。');
        setStatus('步骤1/4：正在执行证书颁发与链上查询');

        await sleep(randomMs(NON_KEY_STAGE_MS));
        if (token !== state.animationToken) return;

        appendBothLogs('[区块链系统服务组件] 启动证书颁发流程，准备写入链上证书信息。');

        const okPath = await animatePath(paths.seg1, 650, token);
        if (!okPath) return;
        const okNode = await pulseNode('issue', true, token);
        if (!okNode) return;

        appendBothLogs('[区块链系统服务组件] 执行链上证书查询，证书记录一致性校验通过。');
        setStatus('步骤1完成：可手动触发“分布式认证”或“集中式认证”测试');

        state.runningMode = null;
        setButtonsState();
      }

      async function doRequestStage(mode, sampleNo, token) {
        const targetCount = state[mode].targetCount;
        const modeLabel = mode === 'distributed' ? '分布式' : '集中式';
        appendLog(mode, '[异域无人机] 第' + sampleNo + '次发起跨域证书认证请求。');
        setStatus('步骤2/3：' + modeLabel + ' 第' + sampleNo + '/' + targetCount + '次 - 无人机认证请求');

        resetSampleFlowVisual();
        const okPath = await animatePath(paths.seg2, 420, token);
        if (!okPath) return false;
        return pulseNode('request', true, token);
      }

      async function doAuthStage(mode, sampleNo, token) {
        const targetCount = state[mode].targetCount;
        const modeLabel = mode === 'distributed' ? '分布式' : '集中式';
        appendLog(mode, '[接入点] 第' + sampleNo + '次启动' + modeLabel + '跨域证书验证。');
        setStatus('步骤2/3：' + modeLabel + ' 第' + sampleNo + '/' + targetCount + '次 - 接入点验证中');

        const path = mode === 'distributed' ? paths.top : paths.bottom;
        const nodeKey = mode === 'distributed' ? 'distributed' : 'centralized';

        const okPath = await animatePath(path, 560, token);
        if (!okPath) return false;
        return pulseNode(nodeKey, true, token);
      }

      function getModeAvg(mode) {
        const samples = state[mode].samples;
        const sum = samples.reduce((acc, value) => acc + value, 0);
        return sum / samples.length;
      }

      async function runModeBatch(mode) {
        if (!state.session.started || state.runningMode !== null || state[mode].done) {
          return;
        }

        const targetCount = readTargetCount(mode);
        if (targetCount === null) {
          updateMetricsPanel();
          return;
        }

        state[mode].targetCount = targetCount;
        state[mode].samples = [];
        state[mode].avgLatency = null;
        state[mode].completedCount = 0;
        updateMetricsPanel();

        state.runningMode = mode;
        state[mode].running = true;
        state.animationToken += 1;
        const token = state.animationToken;
        setButtonsState();

        const modeLabel = mode === 'distributed' ? '分布式认证' : '集中式认证';
        appendLog(mode, '[测试控制器] ' + modeLabel + '批量测试启动，样本数=' + targetCount + '。');

        for (let i = 1; i <= targetCount; i += 1) {
          if (token !== state.animationToken) {
            return;
          }

          await sleep(randomMs(NON_KEY_STAGE_MS));
          if (token !== state.animationToken) {
            return;
          }

          const okRequest = await doRequestStage(mode, i, token);
          if (!okRequest || token !== state.animationToken) {
            return;
          }

          await sleep(randomMs(AUTH_STAGE_MS[mode]));
          if (token !== state.animationToken) {
            return;
          }

          const okAuth = await doAuthStage(mode, i, token);
          if (!okAuth || token !== state.animationToken) {
            return;
          }

          await sleep(randomMs(NON_KEY_STAGE_MS));
          if (token !== state.animationToken) {
            return;
          }

          const latency = randomInRange(LATENCY_RANGE[mode][0], LATENCY_RANGE[mode][1]);
          state[mode].samples.push(latency);
          state[mode].completedCount = i;
          state[mode].avgLatency = getModeAvg(mode);
          updateMetricsPanel();

          appendLog(
            mode,
            '[区块链系统服务组件] 第' + i + '次认证时延=' + formatSeconds(latency) + 's，已完成统计。'
          );
        }

        if (token !== state.animationToken) {
          return;
        }

        const avg = state[mode].avgLatency === null ? getModeAvg(mode) : state[mode].avgLatency;
        state[mode].avgLatency = avg;
        state[mode].done = true;
        state[mode].running = false;
        state.runningMode = null;
        updateMetricsPanel();

        appendLog(mode, '[统计结果] ' + modeLabel + '平均时延=' + formatSeconds(avg) + 's（样本' + targetCount + '次）。');
        setStatus(modeLabel + '完成，等待另一方案完成后自动计算效率提升。');

        handleComparisonResult();

        setButtonsState();
      }

      function resetSessionData() {
        state.distributed = createModeState();
        state.centralized = createModeState();
        state.comparison = {
          ready: false,
          improvementPercent: null
        };
        state.distributed.targetCount = DEFAULT_SAMPLE_COUNT;
        state.centralized.targetCount = DEFAULT_SAMPLE_COUNT;
        updateMetricsPanel();
      }

      startBtn.addEventListener('click', async () => {
        if (state.runningMode !== null) {
          return;
        }

        state.session.started = true;
        state.session.roundId += 1;
        state.session.baseTime = Date.now();

        resetSessionData();
        setButtonsState();
        await runInitialization();
      });

      modeButtons.forEach((button) => {
        button.addEventListener('click', () => {
          const mode = button.dataset.mode;
          runModeBatch(mode);
        });
      });

      resetFlow();
      clearLogs();
      hideComparison();
      updateMetricsPanel();
      setButtonsState();
    })();
  </script>
</body>
</html>
