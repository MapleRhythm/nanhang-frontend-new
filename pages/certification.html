<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>可信安全认证</title>
  <style>
    * { box-sizing: border-box; }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      background: #ffffff;
      color: #1f2937;
    }

    .page {
      height: 100%;
      display: grid;
      grid-template-rows: 3fr 2fr;
    }

    .section {
      padding: 16px;
      min-height: 0;
    }

    .section + .section {
      border-top: 1px dashed #cbd5e1;
    }

    .image-wrap {
      width: 100%;
      height: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      overflow: hidden;
      background: #f8fafc;
    }

    .image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .bottom-layout {
      display: grid;
      grid-template-columns: 4.5fr 5.5fr;
      gap: 16px;
      height: 100%;
      min-height: 0;
    }

    .left-panel {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #f9fafb;
      padding: 14px;
      display: grid;
      grid-template-rows: auto auto auto auto;
      gap: 12px;
      min-height: 0;
    }

    .mode-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .test-config {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .test-config-label {
      font-size: 12px;
      font-weight: 600;
      color: #334155;
      white-space: nowrap;
    }

    .test-count-input {
      width: 180px;
      max-width: 100%;
      height: 34px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #ffffff;
      color: #0f172a;
      font-size: 13px;
      padding: 0 10px;
      outline: none;
    }

    .test-count-input:focus {
      border-color: #0f766e;
      box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.14);
    }

    .mode-btn {
      border: 1px solid #0f5f82;
      border-radius: 8px;
      background: #186487;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      padding: 11px 8px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .mode-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(24, 100, 135, 0.25);
    }

    .mode-btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      box-shadow: none;
      transform: none;
    }

    .mode-btn.start-btn {
      border-color: #0a7661;
      background: #0f8a72;
    }

    .mode-btn.is-active {
      background: #0d4f6d;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.3);
    }

    .mode-btn.is-done {
      background: #0e7490;
      border-color: #0e7490;
    }

    .flow-wrap {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
      padding: 10px;
      height: auto;
      overflow: hidden;
      display: flex;
    }

    .flow-svg {
      width: 100%;
      height: auto;
      aspect-ratio: 900 / 320;
    }

    .flow-base {
      fill: none;
      stroke: #8ab8de;
      stroke-width: 20;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .flow-active {
      fill: none;
      stroke: #2563eb;
      stroke-width: 30;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 4px rgba(37, 99, 235, 0.6));
    }

    .flow-node {
      fill: #ffffff;
      stroke: #93a4b5;
      stroke-width: 3;
      transition: fill 0.3s ease, stroke 0.3s ease, r 0.3s ease;
    }

    .flow-node.is-visited {
      fill: #ffffff;
      stroke: #2563eb;
    }

    .flow-node.is-active {
      fill: #ffffff;
      stroke: #1d4ed8;
      stroke-width: 4;
    }

    .flow-label {
      fill: #111827;
      font-size: 24px;
      font-weight: 600;
      user-select: none;
    }

    .flow-label-small {
      fill: #111827;
      font-size: 22px;
      font-weight: 600;
      user-select: none;
    }

    .flow-status {
      margin: 0;
      min-height: 22px;
      font-size: 14px;
      color: #1d4ed8;
      font-weight: 600;
    }

    .right-panel {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      min-height: 0;
      align-items: stretch;
    }

    .log-box {
      border: 1px solid #111827;
      border-radius: 10px;
      background: #05070a;
      color: #3cff84;
      padding: 10px 10px 8px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 8px;
      min-height: 0;
      overflow: hidden;
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      height: 100%;
    }

    .log-title {
      margin: 0;
      font-size: 15px;
      color: #7dffab;
      border-bottom: 1px solid #1f2937;
      padding-bottom: 8px;
    }

    .log-content {
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 12px;
      line-height: 1.55;
      overflow-y: auto;
      overflow-x: hidden;
      white-space: pre-wrap;
    }

    .log-content li {
      margin: 0 0 6px;
      word-break: break-word;
    }

    .log-metric {
      margin: 0;
      padding-top: 6px;
      border-top: 1px dashed rgba(125, 255, 171, 0.35);
      font-size: 12px;
      font-weight: 700;
      color: #93c5fd;
      line-height: 1.4;
    }

    .comparison-overlay {
      position: absolute;
      left: 50%;
      top: 56%;
      transform: translate(-50%, -50%);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
      z-index: 5;
      width: 200px;
    }

    .comparison-overlay.is-visible {
      display: flex;
    }

    .comparison-text {
      margin: 0;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(239, 68, 68, 0.55);
      background: rgba(255, 255, 255, 0.97);
      box-shadow: 0 4px 14px rgba(220, 38, 38, 0.18);
      color: #dc2626;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .comparison-arrow {
      width: 170px;
      height: 28px;
      display: block;
      filter: drop-shadow(0 2px 5px rgba(220, 38, 38, 0.28));
    }

    @media (max-width: 1000px) {
      .bottom-layout {
        grid-template-columns: 1fr;
      }

      .right-panel {
        grid-template-columns: 1fr;
      }

      .comparison-overlay {
        position: static;
        transform: none;
        margin: 4px auto;
        width: 170px;
      }

      .comparison-arrow {
        width: 150px;
        height: 24px;
      }
    }

    @media (max-width: 760px) {
      .mode-buttons {
        grid-template-columns: 1fr;
      }

      .test-count-input {
        width: 100%;
      }

      .flow-label {
        font-size: 19px;
      }

      .flow-label-small {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="section">
      <div class="image-wrap">
        <img src="../assets/renzheng.png" alt="认证示意图" />
      </div>
    </section>

    <section class="section">
      <div class="bottom-layout">
        <div class="left-panel">
          <div class="mode-buttons">
            <button class="mode-btn start-btn" type="button" id="start-test-btn">开始测试</button>
            <button class="mode-btn" type="button" data-mode="distributed" id="distributed-btn">分布式认证</button>
            <button class="mode-btn" type="button" data-mode="centralized" id="centralized-btn">集中式认证</button>
          </div>

          <div class="test-config">
            <label class="test-config-label" for="sample-count-input">总测试次数（可选）</label>
            <input
              class="test-count-input"
              id="sample-count-input"
              type="text"
              inputmode="numeric"
              placeholder="留空=10，范围1-100"
              aria-label="总测试次数"
            />
          </div>

          <div class="flow-wrap">
            <svg class="flow-svg" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" aria-label="认证流程图">
              <path class="flow-base" d="M50 175 L375 175" />
              <path class="flow-base" d="M375 175 C455 175 455 95 560 95 L700 95" />
              <path class="flow-base" d="M375 175 C455 175 455 255 560 255 L700 255" />

              <path id="active-seg-1" class="flow-active" d="M50 175 L190 175" />
              <path id="active-seg-2" class="flow-active" d="M190 175 L375 175" />
              <path id="active-seg-top" class="flow-active" d="M375 175 C455 175 455 95 560 95 L700 95" />
              <path id="active-seg-bottom" class="flow-active" d="M375 175 C455 175 455 255 560 255 L700 255" />

              <circle id="node-issue" class="flow-node" cx="190" cy="175" r="10" />
              <circle id="node-request" class="flow-node" cx="375" cy="175" r="10" />
              <circle id="node-distributed" class="flow-node" cx="700" cy="95" r="10" />
              <circle id="node-centralized" class="flow-node" cx="700" cy="255" r="10" />

              <text class="flow-label" x="125" y="225">证书颁发</text>
              <text class="flow-label" x="260" y="225">无人机认证请求</text>
              <text class="flow-label-small" x="560" y="80">分布式认证</text>
              <text class="flow-label-small" x="560" y="286">集中式认证</text>
            </svg>
          </div>

          <p class="flow-status" id="flow-status" style="display:none;">点击“开始测试”初始化流程</p>
        </div>

        <div class="right-panel">
          <article class="log-box">
            <h3 class="log-title">集中式认证日志</h3>
            <ul class="log-content" id="centralized-log"></ul>
            <p class="log-metric" id="centralized-metrics">集中式：已完成 0/10，当前平均时延 --</p>
          </article>

          <div class="comparison-overlay" id="comparison-overlay">
            <p class="comparison-text" id="comparison-text"></p>
            <svg class="comparison-arrow" viewBox="0 0 170 28" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <rect x="0" y="7" width="148" height="14" fill="#dc2626"></rect>
              <polygon points="148,0 170,14 148,28" fill="#dc2626"></polygon>
            </svg>
          </div>

          <article class="log-box">
            <h3 class="log-title">分布式认证日志</h3>
            <ul class="log-content" id="distributed-log"></ul>
            <p class="log-metric" id="distributed-metrics">分布式：已完成 0/10，当前平均时延 --</p>
          </article>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const DEFAULT_SAMPLE_COUNT = 10;
      const MIN_SAMPLE_COUNT = 1;
      const MAX_SAMPLE_COUNT = 100;
      const NODE_BASE_R = 10;
      const NODE_ACTIVE_R = 17;
      const NON_KEY_STAGE_MS = [400, 1000];
      const AUTH_STAGE_MS = {
        distributed: [500, 700],
        centralized: [900, 1100]
      };
      const LATENCY_RANGE = {
        distributed: [0.5, 0.7],
        centralized: [0.9, 1.1]
      };

      const startBtn = document.getElementById('start-test-btn');
      const modeButtons = document.querySelectorAll('[data-mode]');
      const distributedBtn = document.getElementById('distributed-btn');
      const centralizedBtn = document.getElementById('centralized-btn');
      const sampleCountInput = document.getElementById('sample-count-input');

      const statusEl = document.getElementById('flow-status');
      const distributedMetricsEl = document.getElementById('distributed-metrics');
      const centralizedMetricsEl = document.getElementById('centralized-metrics');
      const logEls = {
        distributed: document.getElementById('distributed-log'),
        centralized: document.getElementById('centralized-log')
      };

      const comparisonOverlay = document.getElementById('comparison-overlay');
      const comparisonText = document.getElementById('comparison-text');

      const paths = {
        seg1: document.getElementById('active-seg-1'),
        seg2: document.getElementById('active-seg-2'),
        top: document.getElementById('active-seg-top'),
        bottom: document.getElementById('active-seg-bottom')
      };

      const nodes = {
        issue: document.getElementById('node-issue'),
        request: document.getElementById('node-request'),
        distributed: document.getElementById('node-distributed'),
        centralized: document.getElementById('node-centralized')
      };

      function createModeState() {
        return {
          samples: [],
          avgLatency: null,
          completedCount: 0,
          targetCount: DEFAULT_SAMPLE_COUNT,
          running: false,
          done: false
        };
      }

      const state = {
        session: {
          started: false,
          roundId: 0,
          baseTime: 0
        },
        distributed: createModeState(),
        centralized: createModeState(),
        comparison: {
          ready: false,
          improvementPercent: null
        },
        runningMode: null,
        animationToken: 0
      };

      function randomInRange(min, max) {
        return min + Math.random() * (max - min);
      }

      function randomMs(range) {
        return Math.round(randomInRange(range[0], range[1]));
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function nowStamp() {
        const d = new Date();
        const ms = String(d.getMilliseconds()).padStart(3, '0');
        return d.toLocaleTimeString('zh-CN', { hour12: false }) + '.' + ms;
      }

      function formatSeconds(sec) {
        return sec.toFixed(3);
      }

      function appendLog(mode, message) {
        const ul = logEls[mode];
        const li = document.createElement('li');
        li.textContent = '[' + nowStamp() + '] ' + message;
        ul.appendChild(li);
        ul.scrollTop = ul.scrollHeight;
      }

      function appendBothLogs(message) {
        appendLog('distributed', message);
        appendLog('centralized', message);
      }

      function clearLogs() {
        Object.values(logEls).forEach((ul) => {
          ul.innerHTML = '';
        });
      }

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function getMetricText(modeLabel, modeState) {
        const avgText = modeState.avgLatency === null ? '--' : formatSeconds(modeState.avgLatency) + 's';
        return modeLabel + '：已完成 ' + modeState.completedCount + '/' + modeState.targetCount + '，当前平均时延 ' + avgText;
      }

      function updateMetricsPanel() {
        distributedMetricsEl.textContent = getMetricText('分布式', state.distributed);
        centralizedMetricsEl.textContent = getMetricText('集中式', state.centralized);
      }

      function readTargetCount(mode) {
        const raw = sampleCountInput.value.trim();
        if (raw === '') {
          return DEFAULT_SAMPLE_COUNT;
        }

        if (!/^\d+$/.test(raw)) {
          setStatus('输入错误：总测试次数必须为整数（1-100）');
          appendLog(mode, '[测试控制器] 输入错误：总测试次数必须为整数（1-100）。');
          return null;
        }

        const value = Number(raw);
        if (value < MIN_SAMPLE_COUNT || value > MAX_SAMPLE_COUNT) {
          setStatus('输入错误：总测试次数范围应为 1-100');
          appendLog(mode, '[测试控制器] 输入错误：总测试次数范围应为 1-100。');
          return null;
        }

        return value;
      }

      function hideComparison() {
        state.comparison.ready = false;
        state.comparison.improvementPercent = null;
        comparisonText.textContent = '';
        comparisonOverlay.classList.remove('is-visible');
      }

      function showComparison() {
        const dist = state.distributed.avgLatency;
        const cent = state.centralized.avgLatency;
        if (dist === null || cent === null) {
          return;
        }
        const improvement = ((cent - dist) / cent) * 100;
        state.comparison.ready = true;
        state.comparison.improvementPercent = improvement;
        comparisonText.textContent =
          '效率提升 ' + improvement.toFixed(2) + '% | 分布式 ' + formatSeconds(dist) + 's vs 集中式 ' + formatSeconds(cent) + 's';
        comparisonOverlay.classList.add('is-visible');
      }

      function handleComparisonResult() {
        if (!state.distributed.done || !state.centralized.done) {
          return;
        }

        if (state.distributed.targetCount !== state.centralized.targetCount) {
          hideComparison();
          setStatus('样本数不一致，无法对比，请重新测试并保持一致');
          appendBothLogs(
            '[对比结果] 样本数不一致（分布式' +
              state.distributed.targetCount +
              '次，集中式' +
              state.centralized.targetCount +
              '次），无法计算效率提升。'
          );
          return;
        }

        showComparison();
        setStatus('步骤4/4：对比完成，分布式跨域认证效率提升已生成');
      }

      function setButtonsState() {
        const busy = state.runningMode !== null;
        startBtn.disabled = busy;
        sampleCountInput.disabled = busy;

        const distDisabled = !state.session.started || busy || state.distributed.done;
        const centDisabled = !state.session.started || busy || state.centralized.done;
        distributedBtn.disabled = distDisabled;
        centralizedBtn.disabled = centDisabled;

        distributedBtn.classList.toggle('is-active', state.runningMode === 'distributed');
        centralizedBtn.classList.toggle('is-active', state.runningMode === 'centralized');
        distributedBtn.classList.toggle('is-done', state.distributed.done);
        centralizedBtn.classList.toggle('is-done', state.centralized.done);
      }

      function initPath(path) {
        const total = path.getTotalLength();
        path.dataset.total = String(total);
        path.style.transition = 'none';
        path.style.strokeDasharray = String(total);
        path.style.strokeDashoffset = String(total);
      }

      function hidePath(path) {
        path.style.transition = 'none';
        path.style.strokeDashoffset = path.dataset.total;
      }

      function showPath(path) {
        path.style.transition = 'none';
        path.style.strokeDashoffset = '0';
      }

      function setNode(nodeKey, visited, active) {
        const node = nodes[nodeKey];
        node.classList.toggle('is-visited', Boolean(visited));
        node.classList.toggle('is-active', Boolean(active));
        node.setAttribute('r', String(active ? NODE_ACTIVE_R : NODE_BASE_R));
      }

      function resetFlow() {
        Object.values(paths).forEach(initPath);
        Object.keys(nodes).forEach((key) => setNode(key, false, false));
      }

      function resetSampleFlowVisual() {
        hidePath(paths.seg2);
        hidePath(paths.top);
        hidePath(paths.bottom);
        setNode('request', false, false);
        setNode('distributed', false, false);
        setNode('centralized', false, false);
        setNode('issue', true, false);
      }

      function animatePath(path, duration, token) {
        return new Promise((resolve) => {
          if (token !== state.animationToken) {
            resolve(false);
            return;
          }

          path.style.transition = 'none';
          path.style.strokeDashoffset = path.dataset.total;

          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              path.style.transition = 'stroke-dashoffset ' + duration + 'ms linear';
              path.style.strokeDashoffset = '0';
            });
          });

          window.setTimeout(() => {
            resolve(token === state.animationToken);
          }, duration + 30);
        });
      }

      async function pulseNode(nodeKey, keepVisited, token) {
        if (token !== state.animationToken) {
          return false;
        }
        setNode(nodeKey, true, true);
        await sleep(260);
        if (token !== state.animationToken) {
          return false;
        }
        setNode(nodeKey, keepVisited, false);
        return true;
      }

      async function runInitialization() {
        state.runningMode = 'init';
        state.animationToken += 1;
        const token = state.animationToken;
        setButtonsState();

        clearLogs();
        hideComparison();
        resetFlow();

        appendBothLogs('[测试控制器] 新一轮认证测试启动，轮次 ID=' + state.session.roundId + '。');
        setStatus('步骤1/4：正在执行证书颁发与链上查询');

        await sleep(randomMs(NON_KEY_STAGE_MS));
        if (token !== state.animationToken) return;

        appendBothLogs('[区块链系统服务组件] 启动证书颁发流程，准备写入链上证书信息。');

        const okPath = await animatePath(paths.seg1, 650, token);
        if (!okPath) return;
        const okNode = await pulseNode('issue', true, token);
        if (!okNode) return;

        appendBothLogs('[区块链系统服务组件] 执行链上证书查询，证书记录一致性校验通过。');
        setStatus('步骤1完成：可手动触发“分布式认证”或“集中式认证”测试');

        state.runningMode = null;
        setButtonsState();
      }

      async function doRequestStage(mode, sampleNo, token) {
        const targetCount = state[mode].targetCount;
        const modeLabel = mode === 'distributed' ? '分布式' : '集中式';
        appendLog(mode, '[异域无人机] 第' + sampleNo + '次发起跨域证书认证请求。');
        setStatus('步骤2/3：' + modeLabel + ' 第' + sampleNo + '/' + targetCount + '次 - 无人机认证请求');

        resetSampleFlowVisual();
        const okPath = await animatePath(paths.seg2, 420, token);
        if (!okPath) return false;
        return pulseNode('request', true, token);
      }

      async function doAuthStage(mode, sampleNo, token) {
        const targetCount = state[mode].targetCount;
        const modeLabel = mode === 'distributed' ? '分布式' : '集中式';
        appendLog(mode, '[接入点] 第' + sampleNo + '次启动' + modeLabel + '跨域证书验证。');
        setStatus('步骤2/3：' + modeLabel + ' 第' + sampleNo + '/' + targetCount + '次 - 接入点验证中');

        const path = mode === 'distributed' ? paths.top : paths.bottom;
        const nodeKey = mode === 'distributed' ? 'distributed' : 'centralized';

        const okPath = await animatePath(path, 560, token);
        if (!okPath) return false;
        return pulseNode(nodeKey, true, token);
      }

      function getModeAvg(mode) {
        const samples = state[mode].samples;
        const sum = samples.reduce((acc, value) => acc + value, 0);
        return sum / samples.length;
      }

      async function runModeBatch(mode) {
        if (!state.session.started || state.runningMode !== null || state[mode].done) {
          return;
        }

        const targetCount = readTargetCount(mode);
        if (targetCount === null) {
          updateMetricsPanel();
          return;
        }

        state[mode].targetCount = targetCount;
        state[mode].samples = [];
        state[mode].avgLatency = null;
        state[mode].completedCount = 0;
        updateMetricsPanel();

        state.runningMode = mode;
        state[mode].running = true;
        state.animationToken += 1;
        const token = state.animationToken;
        setButtonsState();

        const modeLabel = mode === 'distributed' ? '分布式认证' : '集中式认证';
        appendLog(mode, '[测试控制器] ' + modeLabel + '批量测试启动，样本数=' + targetCount + '。');

        for (let i = 1; i <= targetCount; i += 1) {
          if (token !== state.animationToken) {
            return;
          }

          await sleep(randomMs(NON_KEY_STAGE_MS));
          if (token !== state.animationToken) {
            return;
          }

          const okRequest = await doRequestStage(mode, i, token);
          if (!okRequest || token !== state.animationToken) {
            return;
          }

          await sleep(randomMs(AUTH_STAGE_MS[mode]));
          if (token !== state.animationToken) {
            return;
          }

          const okAuth = await doAuthStage(mode, i, token);
          if (!okAuth || token !== state.animationToken) {
            return;
          }

          await sleep(randomMs(NON_KEY_STAGE_MS));
          if (token !== state.animationToken) {
            return;
          }

          const latency = randomInRange(LATENCY_RANGE[mode][0], LATENCY_RANGE[mode][1]);
          state[mode].samples.push(latency);
          state[mode].completedCount = i;
          state[mode].avgLatency = getModeAvg(mode);
          updateMetricsPanel();

          appendLog(
            mode,
            '[区块链系统服务组件] 第' + i + '次认证时延=' + formatSeconds(latency) + 's，已完成统计。'
          );
        }

        if (token !== state.animationToken) {
          return;
        }

        const avg = state[mode].avgLatency === null ? getModeAvg(mode) : state[mode].avgLatency;
        state[mode].avgLatency = avg;
        state[mode].done = true;
        state[mode].running = false;
        state.runningMode = null;
        updateMetricsPanel();

        appendLog(mode, '[统计结果] ' + modeLabel + '平均时延=' + formatSeconds(avg) + 's（样本' + targetCount + '次）。');
        setStatus(modeLabel + '完成，等待另一方案完成后自动计算效率提升。');

        handleComparisonResult();

        setButtonsState();
      }

      function resetSessionData() {
        state.distributed = createModeState();
        state.centralized = createModeState();
        state.comparison = {
          ready: false,
          improvementPercent: null
        };
        state.distributed.targetCount = DEFAULT_SAMPLE_COUNT;
        state.centralized.targetCount = DEFAULT_SAMPLE_COUNT;
        updateMetricsPanel();
      }

      startBtn.addEventListener('click', async () => {
        if (state.runningMode !== null) {
          return;
        }

        state.session.started = true;
        state.session.roundId += 1;
        state.session.baseTime = Date.now();

        resetSessionData();
        setButtonsState();
        await runInitialization();
      });

      modeButtons.forEach((button) => {
        button.addEventListener('click', () => {
          const mode = button.dataset.mode;
          runModeBatch(mode);
        });
      });

      resetFlow();
      clearLogs();
      hideComparison();
      updateMetricsPanel();
      setButtonsState();
    })();
  </script>
</body>
</html>
